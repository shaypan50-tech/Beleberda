<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Курс валют — стекло & флаги</title>
  <style>
    :root {
      --bg: #08080a;
      --glass-bg: rgba(255, 255, 255, 0.025);
      --glass-border: rgba(255, 255, 255, 0.06);
      --text-primary: rgba(255, 255, 255, 0.92);
      --text-secondary: rgba(255, 255, 255, 0.42);
      --circle-size: 150px;
      --panel-width: min(88vw, 620px);
      --big-height: min(55vh, 400px);
      --small-height: min(14vh, 100px);
      --radius: 28px;
      --transition: 0.6s cubic-bezier(0.22, 0.1, 0.22, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      user-select: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.008) 0%, transparent 75%);
      pointer-events: none;
      z-index: 0;
    }

    .panels-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: var(--panel-width);
    }

    .glass-wrapper {
      position: relative;
      width: 100%;
      border-radius: var(--radius);
      transition: height var(--transition);
      will-change: height;
      cursor: default;
    }

    .glass-wrapper.top-panel { height: var(--big-height); }
    .glass-wrapper.bottom-panel { height: var(--small-height); }
    .glass-wrapper.top-panel.collapsed { height: var(--small-height); }
    .glass-wrapper.bottom-panel.expanded { height: var(--big-height); }

    .cursor-circle {
      position: absolute;
      width: var(--circle-size);
      height: var(--circle-size);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at center,
          rgba(255, 255, 255, 0.96) 0%,
          rgba(255, 255, 255, 0.65) 12%,
          rgba(255, 255, 255, 0.32) 26%,
          rgba(255, 255, 255, 0.12) 44%,
          rgba(255, 255, 255, 0.02) 62%,
          rgba(255, 255, 255, 0) 73%);
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: left, top, opacity;
    }

    .cursor-circle.visible {
      opacity: 1;
      transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-panel {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      border-radius: var(--radius);
      background: var(--glass-bg);
      backdrop-filter: blur(36px) saturate(150%);
      -webkit-backdrop-filter: blur(36px) saturate(150%);
      border: 1px solid var(--glass-border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 18px 44px rgba(0,0,0,0.55), 0 2px 10px rgba(0,0,0,0.35);
      transition: border-color 0.5s ease, background 0.5s ease, box-shadow 0.5s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .glass-wrapper:hover .glass-panel {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.045);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 22px 52px rgba(0,0,0,0.6), 0 2px 12px rgba(0,0,0,0.4);
    }

    .panel-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .panel-content.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .rate-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .rate-label {
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .rate-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .rate-value {
      font-size: 64px;
      font-weight: 260;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      transition: transform 0.3s ease, color 0.3s ease;
    }

    .rate-value.pulse {
      animation: softPulse 0.6s ease;
    }

    @keyframes softPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); color: #fff; }
      100% { transform: scale(1); }
    }

    .rate-currency {
      font-size: 28px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-left: 4px;
    }

    .rate-details {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 10px;
      font-size: 15px;
      color: var(--text-secondary);
    }

    .rate-change {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 500;
    }

    .rate-change.positive { color: #6ee7b7; }
    .rate-change.negative { color: #fca5a5; }

    .rate-updated { opacity: 0.7; font-size: 14px; }

    .button-label {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 20px;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }

    .arrow-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      color: var(--text-secondary);
      font-size: 20px;
      transition: background 0.3s, transform 0.3s;
    }

    .glass-wrapper:hover .arrow-icon {
      background: rgba(255,255,255,0.14);
      transform: scale(1.05);
    }

    /* ----- ПЕРЕРАБОТАННЫЙ КОНВЕРТЕР ----- */
    .converter {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      width: 100%;
      padding: 0 32px;
    }

    .converter-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .amount-input-wrapper {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.3s, background 0.3s;
      width: 110px;
      flex-shrink: 0;
    }

    .amount-input-wrapper:focus-within {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.08);
    }

    .amount-input {
      width: 100%;
      background: transparent;
      border: none;
      padding: 14px 12px;
      font-size: 20px;
      color: var(--text-primary);
      outline: none;
      text-align: center;
      font-family: inherit;
      -moz-appearance: textfield;
    }

    .amount-input::-webkit-outer-spin-button,
    .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .spin-buttons {
      display: flex;
      flex-direction: column;
      border-left: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .spin-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      width: 30px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s, color 0.2s, transform 0.1s;
      line-height: 1;
    }

    .spin-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .spin-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
    .spin-btn:first-child { border-bottom: 1px solid rgba(255,255,255,0.06); }

    .custom-select {
      flex: 1;
      position: relative;
      font-size: 18px;
      min-width: 0;
    }

    .select-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 14px 16px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.3s;
      gap: 10px;
    }

    .select-trigger:hover {
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.07);
    }

    .select-trigger .arrow {
      font-size: 14px;
      color: var(--text-secondary);
      transition: transform 0.3s;
      flex-shrink: 0;
    }

    .custom-select.open .select-trigger .arrow { transform: rotate(180deg); }

    .flag-img {
      width: 22px;
      height: 15px;
      object-fit: cover;
      border-radius: 2px;
      margin-right: 10px;
      flex-shrink: 0;
      opacity: 0.92;
      border: none;
      outline: none;
      box-shadow: none;
      vertical-align: middle;
    }

    .selected-text {
      display: flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .select-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: rgba(14,14,18,0.99);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.7);
      z-index: 300;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-6px);
      transition: opacity 0.25s ease, visibility 0.25s ease, transform 0.25s ease;
    }

    .custom-select.open .select-dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .search-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      padding: 14px 16px;
      font-size: 16px;
      color: var(--text-primary);
      outline: none;
      font-family: inherit;
    }

    .search-input::placeholder { color: rgba(255,255,255,0.28); }

    .options-list {
      max-height: 230px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    .options-list::-webkit-scrollbar { width: 4px; }
    .options-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

    .option-item {
      padding: 12px 16px;
      cursor: pointer;
      color: rgba(255,255,255,0.65);
      transition: all 0.2s;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .option-item:hover,
    .option-item.selected { background: rgba(255,255,255,0.07); color: #fff; }

    .option-item .code { font-weight: 500; min-width: 45px; }
    .option-item .name { opacity: 0.7; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .equals-separator {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--text-secondary);
      font-size: 26px;
      font-weight: 300;
      margin: 0 8px;
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .converter-result {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .converted-value {
      font-size: 28px;
      font-weight: 400;
      color: var(--text-primary);
      min-width: 120px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
      flex-shrink: 0;
    }

    @media (max-width: 640px) {
      :root {
        --panel-width: 94vw;
        --big-height: min(50vh, 380px);
        --small-height: min(12vh, 90px);
        --circle-size: 120px;
      }
      .rate-value { font-size: 50px; }
      .rate-currency { font-size: 22px; }
      .button-label { font-size: 17px; }
      .arrow-icon { width: 30px; height: 30px; font-size: 18px; }
      .converter { padding: 0 20px; gap: 18px; }
      .amount-input-wrapper { width: 100px; }
      .amount-input { padding: 12px 8px; font-size: 18px; }
      .converted-value { font-size: 24px; min-width: 100px; }
      .equals-separator { width: 36px; height: 36px; font-size: 22px; }
      .select-trigger { padding: 12px 14px; }
      .flag-img { width: 20px; height: 14px; margin-right: 8px; }
    }
  </style>
</head>
<body>
  <div class="panels-container">
    <div class="glass-wrapper top-panel" id="topWrapper">
      <div class="cursor-circle" id="topCircle"></div>
      <div class="glass-panel">
        <div class="panel-content" id="topContentBig">
          <div class="rate-main">
            <span class="rate-label">USD / RUB</span>
            <div class="rate-row">
              <span class="rate-value" id="rateValue">—</span>
              <span class="rate-currency">₽</span>
            </div>
            <div class="rate-details">
              <span class="rate-change" id="rateChange">—</span>
              <span class="rate-updated" id="rateUpdated"></span>
            </div>
          </div>
        </div>
        <div class="panel-content hidden" id="topContentSmall">
          <div class="button-label">
            <span class="arrow-icon">↑</span>
            <span>Вернуться</span>
          </div>
        </div>
      </div>
    </div>

    <div class="glass-wrapper bottom-panel" id="bottomWrapper">
      <div class="cursor-circle" id="bottomCircle"></div>
      <div class="glass-panel">
        <div class="panel-content" id="bottomContentSmall">
          <div class="button-label">
            <span class="arrow-icon">↓</span>
            <span>Посмотреть курс валют</span>
          </div>
        </div>
        <div class="panel-content hidden" id="bottomContentBig">
          <div class="converter">
            <div class="converter-row">
              <div class="amount-input-wrapper">
                <input type="text" class="amount-input" id="amountInput" value="1" inputmode="decimal" maxlength="10">
                <div class="spin-buttons">
                  <button class="spin-btn spin-up" aria-label="Увеличить">▲</button>
                  <button class="spin-btn spin-down" aria-label="Уменьшить">▼</button>
                </div>
              </div>
              <div class="custom-select" id="fromCurrencySelect"></div>
            </div>
            <div class="converter-result">
              <div class="equals-separator">=</div>
              <span class="converted-value" id="convertedValue">—</span>
              <div class="custom-select" id="toCurrencySelect"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const topWrapper = document.getElementById('topWrapper');
      const bottomWrapper = document.getElementById('bottomWrapper');
      const topContentBig = document.getElementById('topContentBig');
      const topContentSmall = document.getElementById('topContentSmall');
      const bottomContentSmall = document.getElementById('bottomContentSmall');
      const bottomContentBig = document.getElementById('bottomContentBig');
      const rateValueEl = document.getElementById('rateValue');
      const rateChangeEl = document.getElementById('rateChange');
      const rateUpdatedEl = document.getElementById('rateUpdated');
      const amountInput = document.getElementById('amountInput');
      const convertedValueEl = document.getElementById('convertedValue');
      const spinUp = document.querySelector('.spin-up');
      const spinDown = document.querySelector('.spin-down');

      function initGlow(wrapper, circle) {
        let hover = false, targetX = -999, targetY = -999, currentX = -999, currentY = -999, raf = null;
        const updateTarget = (e) => {
          const rect = wrapper.getBoundingClientRect();
          targetX = e.clientX - rect.left;
          targetY = e.clientY - rect.top;
        };
        const animate = () => {
          const ease = 0.5;
          currentX += (targetX - currentX) * ease;
          currentY += (targetY - currentY) * ease;
          const half = circle.offsetWidth / 2;
          const w = wrapper.offsetWidth;
          const h = wrapper.offsetHeight;
          circle.style.left = Math.max(-half*0.4, Math.min(w+half*0.4, currentX)) + 'px';
          circle.style.top = Math.max(-half*0.4, Math.min(h+half*0.4, currentY)) + 'px';
          if (hover) raf = requestAnimationFrame(animate);
        };
        wrapper.addEventListener('mouseenter', (e) => {
          hover = true;
          updateTarget(e);
          currentX = targetX; currentY = targetY;
          circle.classList.add('visible');
          if (raf) cancelAnimationFrame(raf);
          raf = requestAnimationFrame(animate);
        });
        wrapper.addEventListener('mousemove', (e) => { if (hover) updateTarget(e); });
        wrapper.addEventListener('mouseleave', () => {
          hover = false;
          circle.classList.remove('visible');
          if (raf) { cancelAnimationFrame(raf); raf = null; }
        });
        document.addEventListener('mouseleave', () => {
          if (hover) { hover = false; circle.classList.remove('visible'); if (raf) cancelAnimationFrame(raf); }
        });
      }
      initGlow(topWrapper, document.getElementById('topCircle'));
      initGlow(bottomWrapper, document.getElementById('bottomCircle'));

      let isBottomExpanded = false;
      const expandBottom = () => {
        if (isBottomExpanded) return;
        isBottomExpanded = true;
        topWrapper.classList.add('collapsed');
        bottomWrapper.classList.add('expanded');
        topContentBig.classList.add('hidden');
        topContentSmall.classList.remove('hidden');
        bottomContentSmall.classList.add('hidden');
        bottomContentBig.classList.remove('hidden');
        if (!window.ratesData) loadRatesData();
        else { populateSelects(); computeConversion(); }
      };
      const collapseBottom = () => {
        if (!isBottomExpanded) return;
        isBottomExpanded = false;
        topWrapper.classList.remove('collapsed');
        bottomWrapper.classList.remove('expanded');
        topContentBig.classList.remove('hidden');
        topContentSmall.classList.add('hidden');
        bottomContentBig.classList.add('hidden');
        bottomContentSmall.classList.remove('hidden');
      };
      topWrapper.addEventListener('click', (e) => { if (topWrapper.classList.contains('collapsed')) collapseBottom(); });
      bottomWrapper.addEventListener('click', (e) => { if (!bottomWrapper.classList.contains('expanded')) expandBottom(); });

      const currencyData = {
        USD: { name: "Доллар США", country: "us" },
        EUR: { name: "Евро", country: "eu" },
        RUB: { name: "Российский рубль", country: "ru" },
        GBP: { name: "Фунт стерлингов", country: "gb" },
        JPY: { name: "Японская иена", country: "jp" },
        CNY: { name: "Китайский юань", country: "cn" },
        CHF: { name: "Швейцарский франк", country: "ch" },
        CAD: { name: "Канадский доллар", country: "ca" },
        AUD: { name: "Австралийский доллар", country: "au" },
        NZD: { name: "Новозеландский доллар", country: "nz" },
        SEK: { name: "Шведская крона", country: "se" },
        NOK: { name: "Норвежская крона", country: "no" },
        DKK: { name: "Датская крона", country: "dk" },
        ISK: { name: "Исландская крона", country: "is" },
        PLN: { name: "Польский злотый", country: "pl" },
        CZK: { name: "Чешская крона", country: "cz" },
        HUF: { name: "Венгерский форинт", country: "hu" },
        RON: { name: "Румынский лей", country: "ro" },
        BGN: { name: "Болгарский лев", country: "bg" },
        HRK: { name: "Хорватская куна", country: "hr" },
        TRY: { name: "Турецкая лира", country: "tr" },
        INR: { name: "Индийская рупия", country: "in" },
        KRW: { name: "Южнокорейская вона", country: "kr" },
        SGD: { name: "Сингапурский доллар", country: "sg" },
        HKD: { name: "Гонконгский доллар", country: "hk" },
        TWD: { name: "Тайваньский доллар", country: "tw" },
        MYR: { name: "Малайзийский ринггит", country: "my" },
        THB: { name: "Таиландский бат", country: "th" },
        IDR: { name: "Индонезийская рупия", country: "id" },

        UYU: { name: "Уругвайское песо", country: "uy" },
        UAH: { name: "Украинская гривна", country: "ua" },
        BYN: { name: "Белорусский рубль", country: "by" },
        KZT: { name: "Казахстанский тенге", country: "kz" },
        UZS: { name: "Узбекский сум", country: "uz" },
        AZN: { name: "Азербайджанский манат", country: "az" },
        GEL: { name: "Грузинский лари", country: "ge" },
        AMD: { name: "Армянский драм", country: "am" },

      function getFlagUrl(countryCode) {
        return `https://flagcdn.com/20x14/${countryCode}.png`;
      }

      function createCustomSelect(container, defaultCode, onChangeCallback) {
        let selectedCode = defaultCode;
        let isOpen = false;
        const info = currencyData[selectedCode] || { name: selectedCode, country: "xx" };
        const flagUrl = getFlagUrl(info.country);

        const trigger = document.createElement('div');
        trigger.className = 'select-trigger';
        trigger.innerHTML = `<span class="selected-text"><img src="${flagUrl}" class="flag-img" alt="${selectedCode}">${selectedCode} – ${info.name}</span><span class="arrow">▼</span>`;

        const dropdown = document.createElement('div');
        dropdown.className = 'select-dropdown';
        const searchInput = document.createElement('input');
        searchInput.type = 'text';
        searchInput.className = 'search-input';
        searchInput.placeholder = 'Поиск валюты...';
        const optionsList = document.createElement('div');
        optionsList.className = 'options-list';
        dropdown.appendChild(searchInput);
        dropdown.appendChild(optionsList);
        container.appendChild(trigger);
        container.appendChild(dropdown);

        const renderOptions = (filter = '') => {
          optionsList.innerHTML = '';
          const filterLower = filter.toLowerCase();
          const codes = window.ratesData ? Object.keys(window.ratesData) : Object.keys(currencyData);
          codes.forEach(code => {
            const data = currencyData[code] || { name: code, country: "xx" };
            if (filter && !code.toLowerCase().includes(filterLower) && !data.name.toLowerCase().includes(filterLower)) return;
            const item = document.createElement('div');
            item.className = `option-item${code === selectedCode ? ' selected' : ''}`;
            item.innerHTML = `<img src="${getFlagUrl(data.country)}" class="flag-img" alt="${code}"><span class="code">${code}</span><span class="name">${data.name}</span>`;
            item.addEventListener('click', (e) => {
              e.stopPropagation();
              selectedCode = code;
              const newInfo = currencyData[selectedCode] || { name: selectedCode, country: "xx" };
              trigger.querySelector('.selected-text').innerHTML = `<img src="${getFlagUrl(newInfo.country)}" class="flag-img" alt="${selectedCode}">${selectedCode} – ${newInfo.name}`;
              closeDropdown();
              if (onChangeCallback) onChangeCallback(code);
            });
            optionsList.appendChild(item);
          });
        };

        const openDropdown = () => {
          isOpen = true;
          container.classList.add('open');
          searchInput.value = '';
          renderOptions();
          setTimeout(() => searchInput.focus(), 50);
        };
        const closeDropdown = () => {
          isOpen = false;
          container.classList.remove('open');
        };

        trigger.addEventListener('click', (e) => {
          e.stopPropagation();
          isOpen ? closeDropdown() : openDropdown();
        });
        searchInput.addEventListener('input', () => renderOptions(searchInput.value));
        searchInput.addEventListener('click', (e) => e.stopPropagation());
        document.addEventListener('click', (e) => {
          if (isOpen && !container.contains(e.target)) closeDropdown();
        });

        return {
          get value() { return selectedCode; },
          set value(code) {
            selectedCode = code;
            const newInfo = currencyData[selectedCode] || { name: selectedCode, country: "xx" };
            trigger.querySelector('.selected-text').innerHTML = `<img src="${getFlagUrl(newInfo.country)}" class="flag-img" alt="${selectedCode}">${selectedCode} – ${newInfo.name}`;
            renderOptions();
          },
          destroy() { container.innerHTML = ''; }
        };
      }

      function sanitizeInput(value) {
        let sanitized = value.replace(/[^0-9.]/g, '');
        const parts = sanitized.split('.');
        if (parts.length > 2) sanitized = parts[0] + '.' + parts.slice(1).join('');
        if (sanitized.length > 10) sanitized = sanitized.slice(0, 10);
        if (sanitized.startsWith('.')) sanitized = '0' + sanitized;
        return sanitized;
      }

      amountInput.addEventListener('input', () => {
        const sanitized = sanitizeInput(amountInput.value);
        amountInput.value = sanitized;
        computeConversion();
      });
      amountInput.addEventListener('blur', () => {
        if (amountInput.value === '' || isNaN(parseFloat(amountInput.value))) amountInput.value = '1';
        computeConversion();
      });
      spinUp.addEventListener('click', () => {
        let val = parseFloat(amountInput.value) || 0;
        val = Math.min(val + 1, 999999999);
        amountInput.value = val.toString();
        computeConversion();
      });
      spinDown.addEventListener('click', () => {
        let val = parseFloat(amountInput.value) || 0;
        val = Math.max(val - 1, 0);
        amountInput.value = val.toString();
        computeConversion();
      });

      async function fetchUSDRUB() {
        try {
          const resp = await fetch('https://www.cbr-xml-daily.ru/daily_json.js', { signal: AbortSignal.timeout(8000) });
          if (!resp.ok) throw new Error('CBR error');
          const data = await resp.json();
          const val = data?.Valute?.USD;
          if (!val?.Value || !val?.Previous) throw new Error('Invalid data');
          return { rate: val.Value, previous: val.Previous, date: data.Date };
        } catch {
          const resp = await fetch('https://open.er-api.com/v6/latest/USD', { signal: AbortSignal.timeout(8000) });
          const data = await resp.json();
          return { rate: data.rates.RUB, previous: null, date: data.time_last_update_utc };
        }
      }

      let lastRate = null;
      function updateRateDisplay(data) {
        const newRate = data.rate.toFixed(2);
        if (lastRate !== newRate) {
          rateValueEl.textContent = newRate;
          rateValueEl.classList.remove('pulse');
          void rateValueEl.offsetWidth;
          rateValueEl.classList.add('pulse');
          lastRate = newRate;
        }
        if (data.previous) {
          const change = ((data.rate - data.previous) / data.previous) * 100;
          const arrow = change >= 0 ? '▲' : '▼';
          rateChangeEl.innerHTML = `${arrow} ${Math.abs(change).toFixed(2)}%`;
          rateChangeEl.className = `rate-change ${change >= 0 ? 'positive' : 'negative'}`;
        } else rateChangeEl.textContent = '';
        if (data.date) {
          const d = new Date(data.date);
          rateUpdatedEl.textContent = `обновлено ${d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' })}`;
        }
      }

      async function loadUSDRUB() {
        try {
          const data = await fetchUSDRUB();
          updateRateDisplay(data);
        } catch { rateValueEl.textContent = '—'; }
      }

      async function loadRatesData() {
        try {
          const resp = await fetch('https://open.er-api.com/v6/latest/USD', { signal: AbortSignal.timeout(8000) });
          const data = await resp.json();
          window.ratesData = data.rates;
          populateSelects();
          computeConversion();
        } catch { convertedValueEl.textContent = 'ошибка'; }
      }

      let fromSelect, toSelect;
      function populateSelects() {
        if (fromSelect) { fromSelect.destroy(); toSelect.destroy(); }
        fromSelect = createCustomSelect(document.getElementById('fromCurrencySelect'), 'USD', computeConversion);
        toSelect = createCustomSelect(document.getElementById('toCurrencySelect'), 'RUB', computeConversion);
      }

      function computeConversion() {
        if (!window.ratesData || !fromSelect || !toSelect) { convertedValueEl.textContent = '…'; return; }
        const rates = window.ratesData;
        const from = fromSelect.value;
        const to = toSelect.value;
        const amount = parseFloat(amountInput.value) || 0;
        if (!rates[from] || !rates[to]) { convertedValueEl.textContent = '—'; return; }
        const result = amount * (rates[to] / rates[from]);
        convertedValueEl.textContent = result.toFixed(4);
      }

      loadUSDRUB();
      setInterval(loadUSDRUB, 5 * 60 * 1000);
      window.ratesData = null;
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) document.querySelectorAll('.cursor-circle').forEach(c => c.classList.remove('visible'));
      });
    })();
  </script>
